version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/python/x402_a2a"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    rebase-strategy: "disabled"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "python:uv"
    groups:
      uv-version-updates:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
    rebase-strategy: "disabled"
    commit-message:
      prefix: "chore(ci-deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-version-updates:
        patterns:
          - "*"
